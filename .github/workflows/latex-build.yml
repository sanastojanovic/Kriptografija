name: LaTeX build

permissions:
  contents: write

on:
  push:
    paths:
      - "2026_seminarski/**"
  workflow_dispatch:
  pull_request:
    paths:
      - "2026_seminarski/**"

jobs:
  build-latex:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository so the workflow can access the LaTeX sources.
      - name: Check out repository
        uses: actions/checkout@v4

      # Build the LaTeX project from 2026_seminarski/main.tex and fail on any
      # compilation error.
      - name: Build LaTeX project
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: 2026_seminarski
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      # Rename the generated PDF to include the current branch name.
      - name: Rename generated PDF
        shell: bash
        run: |
          set -euo pipefail

          branch_name="${GITHUB_REF_NAME}"
          # Replace slashes and spaces with hyphens so the branch name can be
          # safely used in filenames and artifact names.
          safe_branch_name="$(printf '%s' "$branch_name" | tr '/ ' '--')"
          source_pdf="2026_seminarski/main.pdf"
          target_pdf="kriptografija_napredne_teme_${safe_branch_name}.pdf"

          # Expose the sanitized branch name to later workflow steps.
          echo "SAFE_BRANCH_NAME=${safe_branch_name}" >> "$GITHUB_ENV"
          echo "OUTPUT_PDF=${target_pdf}" >> "$GITHUB_ENV"

          if [[ ! -f "$source_pdf" ]]; then
            echo "Expected PDF not found: $source_pdf" >&2
            exit 1
          fi

          mv "$source_pdf" "$target_pdf"

      # Publish the renamed PDF as a GitHub Release asset.
      # Releases are created or updated per branch using a branch-specific tag.
      - name: Publish release asset
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pdf-${{ github.ref_name }}
          name: PDF release for ${{ env.SAFE_BRANCH_NAME }}
          files: ${{ env.OUTPUT_PDF }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true
